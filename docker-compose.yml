version: '3.8'

services:

  db:
    image: postgis/postgis:15-3.3
    container_name: serre_digitale_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       geoportail
      POSTGRES_USER:     geoportail_user
      POSTGRES_PASSWORD: geoportail_pass_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoportail_user -d geoportail"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: serre_digitale_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
