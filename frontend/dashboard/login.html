<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Serre Digitale Intelligente</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0a2e1a 0%,#0d4a2a 50%,#064e3b 100%);display:flex;align-items:center;justify-content:center;padding:1rem}
.login-card{background:white;border-radius:24px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,0.3)}
.login-header{text-align:center;margin-bottom:2rem}
.login-logo{width:60px;height:60px;background:linear-gradient(135deg,#16a34a,#14b8a6);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 1rem}
.login-title{font-size:22px;font-weight:800;color:#111827;margin-bottom:4px}
.login-sub{font-size:13px;color:#9ca3af}
.form-group{margin-bottom:1.25rem}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
input{width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;font-family:'Outfit',sans-serif;outline:none;transition:all 0.2s;background:#f9fafb;color:#111827}
input:focus{border-color:#16a34a;background:white;box-shadow:0 0 0 3px rgba(22,163,74,0.1)}
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#16a34a,#15803d);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:all 0.3s;margin-top:0.5rem}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(22,163,74,0.4)}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.error-msg{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:1rem;display:none}
.back-link{display:block;text-align:center;margin-top:1.25rem;font-size:13px;color:#9ca3af;text-decoration:none;transition:color 0.2s}
.back-link:hover{color:#16a34a}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.hint{font-size:11px;color:#9ca3af;text-align:center;margin-top:1rem;padding-top:1rem;border-top:1px solid #f3f4f6}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="login-logo">🌿</div>
    <div class="login-title">Espace Gérant</div>
    <div class="login-sub">Serre Digitale Intelligente · IAV Hassan II</div>
  </div>
  <div class="error-msg" id="error-msg"></div>
  <div class="form-group">
    <label for="email">Adresse email</label>
    <input type="email" id="email" placeholder="admin@agrobiotech.ma" autocomplete="email">
  </div>
  <div class="form-group">
    <label for="password">Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-submit" id="btn-login" onclick="doLogin()">Se connecter</button>
  <a href="../index.html" class="back-link">← Retour au géoportail public</a>
  <div class="hint">Admin par défaut : admin@agrobiotech.ma / Admin2024!</div>
</div>

<script>
const API = 'serre-digitale-iav-production.up.railway.app';

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');
  const errEl    = document.getElementById('error-msg');

  if (!email || !password) {
    showError('Veuillez remplir tous les champs.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>Connexion...';
  errEl.style.display = 'none';

  try {
    const form = new FormData();
    form.append('username', email);
    form.append('password', password);

    const res = await fetch(`${API}/api/auth/login`, { method: 'POST', body: form });
    const data = await res.json();

    if (!res.ok) {
      showError(data.detail || 'Email ou mot de passe incorrect.');
      return;
    }

    localStorage.setItem('sdi_token', data.access_token);
    localStorage.setItem('sdi_user', JSON.stringify(data.user));
    window.location.href = 'index.html';

  } catch(e) {
    showError('Impossible de joindre le serveur. Vérifiez que le backend tourne.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Se connecter';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

// Redirect if already logged in
if (localStorage.getItem('sdi_token')) {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
